<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">

    <meta name="theme-color" content="#FAF8F5">

    <link rel="manifest" href="manifest.json">

<body>

<header class="hero">

    <div class="mission-patch">
        🚀
    </div>

    <h1>PROJECT SALUS</h1>

    <h2>MISSION CONTROL</h2>

    <p>Your Personal Health Mission</p>

</header>

<main>

<section class="card primary">

<h3>Calendar Generator</h3>
<div class="form-group">
    <label for="startDate">開始日</label>
    <input type="date" id="startDate">
</div>
<div class="form-group">
    <label for="endDate">終了日</label>
    <input type="date" id="endDate">
</div>
<div class="form-group checkbox">
    <input type="checkbox" id="specialWeek">
    <label for="specialWeek">🏮 SPECIAL WEEK</label>
</div>
<p>Generate Google Calendar</p>

<button id="calendarButton">
Generate Calendar
</button>

<div id="result"></div>
</section>

<section class="card">

<h3>Mission Log</h3>

<p>Coming Soon</p>

</section>

<section class="card">

<h3>Dashboard</h3>

<p>Coming Soon</p>

</section>

<section class="card">

<h3>Settings</h3>

<p>Coming Soon</p>

</section>

</main>

<script src="script.js"></script>

</html>
